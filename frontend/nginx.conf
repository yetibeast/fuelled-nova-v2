server {
    listen 80;
    server_name _;

    # Root redirects to app login
    location = / {
        return 301 /app/login.html;
    }

    # App with sidebar
    location /app/ {
        alias /usr/share/nginx/html/app/;
        try_files $uri $uri/ /app/index.html;
    }

    # Chat interface (for iframe embedding)
    location /chat-interface/ {
        alias /usr/share/nginx/html/chat-interface/;
        try_files $uri $uri/ /chat-interface/index.html;
    }

    # Proxy API to backend
    location /api/ {
        proxy_pass http://backend:8100/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
