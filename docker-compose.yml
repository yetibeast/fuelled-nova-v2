services:
  backend:
    build: ./backend
    ports:
      - "8100:8100"
    env_file:
      - ./backend/.env
    volumes:
      - ./seeds:/app/seeds:ro
    restart: unless-stopped

  frontend:
    build: ./frontend/nova-app
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8100
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
