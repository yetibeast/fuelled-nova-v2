# /etc/cron.d/fuelled-intel — recurring seller-contact enrichment.
#
# Install on the Proxmox scraper runner (container 200):
#   sudo scp run_enrichment.py runner:/opt/scraper-runner/run_enrichment.py
#   sudo scp intel-cron.conf  runner:/etc/cron.d/fuelled-intel
#   sudo chmod 0644 /etc/cron.d/fuelled-intel
#   sudo chown root:root /etc/cron.d/fuelled-intel
#
# Prereqs on the runner:
#   * /opt/scraper-runner/.venv/bin/python with sqlalchemy[asyncio] + anthropic
#   * $DATABASE_URL exported in /opt/scraper-runner/.env (sourced by wrappers)
#   * $ANTHROPIC_API_KEY exported in /opt/scraper-runner/.env
#   * /opt/scraper-runner/logs/ exists and is writable
#
# Cron-expression columns: minute hour day-of-month month day-of-week user command
#
# enrichment_queue is a VIEW — it auto-refreshes on every SELECT. There's
# no separate "detection" job to run. The weekly + quarterly research
# jobs do all the work.

SHELL=/bin/bash
PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

# ── Weekly research dispatch ────────────────────────────────────────
# Monday 08:00 UTC. Up to 20 sellers, abort if cost reaches $10.
0 8 * * 1 root cd /opt/scraper-runner && source .env && /opt/scraper-runner/.venv/bin/python /opt/scraper-runner/run_enrichment.py --db-url "$DATABASE_URL" --limit 20 --max-cost-usd 10 --trigger cron-weekly >> /opt/scraper-runner/logs/intel.log 2>&1

# ── Quarterly refresh ───────────────────────────────────────────────
# 1st of Jan / Apr / Jul / Oct, 03:00 UTC. Larger batch, larger budget,
# picks up sellers that were 'fresh' last week but have now crossed the
# 90-day staleness line.
0 3 1 1,4,7,10 * root cd /opt/scraper-runner && source .env && /opt/scraper-runner/.venv/bin/python /opt/scraper-runner/run_enrichment.py --db-url "$DATABASE_URL" --limit 50 --max-cost-usd 25 --trigger cron-quarterly >> /opt/scraper-runner/logs/intel.log 2>&1
